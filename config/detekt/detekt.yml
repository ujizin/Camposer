# General detekt config — applied to all source sets.
# NoPlatformImportInCommonMain is inactive here because it only makes sense
# for commonMain files (run via the :module:detektCommonMain task).

camposer:
  CameraEngineNotInPublicApi:
    active: true
  NoPlatformImportInCommonMain:
    active: false
  IdempotencyGuardRequired:
    active: true
  ApplierMustCallStateUpdate:
    active: true

style:
  # IdempotencyGuardRequired enforces early returns; ReturnCount would flag them.
  ReturnCount:
    active: false

naming:
  # @Composable functions use PascalCase by Compose convention.
  FunctionNaming:
    active: false
