# Detekt config for commonMain source set (detektCommonMain task).
# IdempotencyGuardRequired targets CameraEngineCore which lives in commonMain.
# ApplierMustCallStateUpdate targets androidMain/iosMain appliers — see detekt-android.yml.

camposer:
  CameraEngineNotInPublicApi:
    active: true
  NoPlatformImportInCommonMain:
    active: true
  IdempotencyGuardRequired:
    active: true
  ApplierMustCallStateUpdate:
    active: false

style:
  ReturnCount:
    active: false

naming:
  FunctionNaming:
    active: false
