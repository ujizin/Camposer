name: Coverage

on:
  pull_request:
    branches: [ '**' ]
    paths:
      - 'camposer/**'
      - 'camposer-code-scanner/**'
      - '.github/workflows/coverage.yml'
      - 'gradle/**'
      - 'gradle.properties'
      - '*.gradle.kts'
      - 'scripts/parse_coverage.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5.1.0
        with:
          distribution: zulu
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - uses: gradle/actions/setup-gradle@v4

      # ── After (PR branch) ────────────────────────────────────────────────────

      - name: Coverage — PR branch
        # testAndroidHostTest ignoreFailures=true in build — Android SDK stubs cause
        # ~half the tests to fail on JVM; real bugs are caught by connectedAndroidTest.
        run: ./gradlew koverXmlReport
        continue-on-error: true

      - name: Parse PR coverage
        id: after
        run: |
          REPORT="build/reports/kover/report.xml"
          if [ -f "$REPORT" ]; then
            pct=$(python3 scripts/parse_coverage.py "$REPORT" 2>/dev/null || echo "N/A")
          else
            pct="N/A"
          fi
          echo "pct=$pct" >> "$GITHUB_OUTPUT"

      # ── Before (base branch) ─────────────────────────────────────────────────

      - name: Checkout base branch
        run: git checkout origin/${{ github.base_ref }}

      - name: Make gradlew executable (base)
        run: chmod +x ./gradlew

      - name: Coverage — base branch
        run: ./gradlew koverXmlReport
        continue-on-error: true

      - name: Parse base coverage
        id: before
        run: |
          pct=$(python3 - << 'EOF'
          import xml.etree.ElementTree as ET
          try:
              root = ET.parse('build/reports/kover/report.xml').getroot()
              covered = missed = 0
              for c in root.findall('counter'):
                  if c.get('type') == 'LINE':
                      covered += int(c.get('covered', 0))
                      missed += int(c.get('missed', 0))
              total = covered + missed
              print(round(covered / total * 100, 1) if total else 0.0)
          except Exception:
              print('N/A')
          EOF
          )
          echo "pct=$pct" >> "$GITHUB_OUTPUT"

      # ── PR comment ───────────────────────────────────────────────────────────

      - name: Post coverage comment
        uses: actions/github-script@v7
        with:
          script: |
            const before = '${{ steps.before.outputs.pct }}';
            const after  = '${{ steps.after.outputs.pct }}';
            const bNum = parseFloat(before);
            const aNum = parseFloat(after);

            let diffStr = 'N/A';
            let emoji   = '';
            if (!isNaN(bNum) && !isNaN(aNum)) {
              const diff = aNum - bNum;
              const sign = diff >= 0 ? '+' : '';
              diffStr = `${sign}${diff.toFixed(1)}%`;
              emoji   = diff > 0 ? ' 🟢' : diff < 0 ? ' 🔴' : ' ⚪';
            }

            const fmt = v => v === 'N/A' ? 'N/A' : `${v}%`;
            const body = [
              '## 📊 Coverage',
              '',
              '| Branch | Line coverage |',
              '|--------|--------------|',
              `| \`${{ github.base_ref }}\` (before) | ${fmt(before)} |`,
              `| This PR (after) | ${fmt(after)} |`,
              `| **Diff** | **${diffStr}**${emoji} |`,
              '',
              '> Only JVM-reachable code is counted. CameraX / AVFoundation hardware code is excluded.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.startsWith('## 📊 Coverage')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
